name: Package Check

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/package.yml"
      - "pyproject.toml"
      - "README.md"
      - "src/**"
  pull_request:
    paths:
      - ".github/workflows/package.yml"
      - "pyproject.toml"
      - "README.md"
      - "src/**"

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build package
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          python -m build
      - name: Validate package metadata
        run: |
          twine check dist/*
